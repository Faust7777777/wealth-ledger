      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    accountId:
      name: accountId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    movementId:
      name: movementId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    atomicGroupId:
      name: atomicGroupId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    planId:
      name: planId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    reminderId:
      name: reminderId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    proposalId:
      name: proposalId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    instrumentId:
      name: instrumentId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    categoryId:
      name: categoryId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    counterpartyId:
      name: counterpartyId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"
    deviceId:
      name: deviceId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ID"

  schemas:
    ID:
      type: string
    ISODate:
      type: string
      format: date
    ISODateTime:
      type: string
      format: date-time
    DecimalString:
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"
    CurrencyCode:
      type: string
      minLength: 2
      maxLength: 12

    AppError:
      type: object
      required: [code, message, severity, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          enum: [info, warning, error, critical]
        retryable:
          type: boolean
        details: {}

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
        currency:
          $ref: "#/components/schemas/CurrencyCode"

    ValueQuality:
      enum: [exact, estimated, incomplete, unpriceable, anomaly]
    QuoteStatus:
      enum: [fresh, stale, offline_cached, incomplete, unpriceable, error]
    MovementStatus:
      enum: [draft, pending_review, confirmed, in_transit, cancelled, reversed]
    AccountType:
      enum:
        - bank
        - brokerage
        - exchange
        - wallet
        - platform_wallet
        - virtual_card
        - social_security
        - credit_card
        - loan
        - cash
        - other

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/OkEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status, serverTime, version]
              properties:
                status:
                  enum: [ok]
                serverTime:
                  $ref: "#/components/schemas/ISODateTime"
                version:
                  type: string

    OkEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          const: true
        data: {}
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          const: false
        error:
          $ref: "#/components/schemas/AppError"

    LoginRequest:
      type: object
      required: [username, password, deviceName]
